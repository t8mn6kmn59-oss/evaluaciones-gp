<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienvenido · GP Empresas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1B2A4A;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .logo {
    width: 80px;
    height: 80px;
    margin-bottom: 1.25rem;
    opacity: 0.9;
  }

  .title {
    font-size: 1.1rem;
    font-weight: 900;
    color: white;
    text-align: center;
    margin-bottom: .3rem;
    letter-spacing: .04em;
  }

  .subtitle {
    font-size: .8rem;
    color: rgba(255,255,255,0.5);
    text-align: center;
    margin-bottom: 1.75rem;
  }

  .video-wrap {
    width: 100%;
    max-width: 560px;
    background: #000;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    position: relative;
    aspect-ratio: 16/9;
  }

  .video-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .loading-video {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    color: rgba(255,255,255,0.4);
    font-size: .85rem;
    flex-direction: column;
    gap: .5rem;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #F5811E;
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-continuar {
    margin-top: 1.5rem;
    width: 100%;
    max-width: 560px;
    padding: 15px 24px;
    background: #F5811E;
    color: white;
    font-size: 15px;
    font-weight: 900;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: .06em;
    transition: background .15s, transform .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0.45;
    pointer-events: none;
  }

  .btn-continuar.active {
    opacity: 1;
    pointer-events: all;
  }

  .btn-continuar.active:hover {
    background: #E06A08;
    transform: translateY(-1px);
  }

  .timer {
    margin-top: .75rem;
    font-size: .75rem;
    color: rgba(255,255,255,0.4);
    text-align: center;
    min-height: 1.2em;
  }

  .error-box {
    width: 100%;
    max-width: 560px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 2rem;
    text-align: center;
    display: none;
  }

  .error-box .icon { font-size: 2.5rem; margin-bottom: .75rem; }
  .error-box p { color: rgba(255,255,255,0.6); font-size: .9rem; line-height: 1.6; }
</style>
</head>
<body>

<!-- Logo GP Empresas -->
<svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="50" r="48" fill="white" opacity="0.1" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="50" y="58" text-anchor="middle" font-size="32" font-weight="900" fill="white" font-family="Arial">GP</text>
</svg>

<div class="title">GP EMPRESAS</div>
<div class="subtitle" id="curso-nombre">Cargando...</div>

<div class="video-wrap" id="video-wrap">
  <div class="loading-video" id="loading">
    <div class="spinner"></div>
    <span>Cargando video...</span>
  </div>
  <iframe
    id="yt-frame"
    src=""
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen
    style="display:none"
  ></iframe>
</div>

<div class="error-box" id="error-box">
  <div class="icon">⚠️</div>
  <p>No se pudo cargar el video.<br>Puedes continuar directamente a la evaluación.</p>
</div>

<button class="btn-continuar" id="btn-continuar" onclick="irAlPortal()">
  ✏️ IR A LA EVALUACIÓN
</button>

<div class="timer" id="timer-msg"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://xztqfvaksurqymbfwckb.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6dHFmdmFrc3VycXltYmZ3Y2tiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTUzMzcsImV4cCI6MjA5MzY3MTMzN30.WBLF5Zuih2mvEXKQp7ozZjJFNoKEb_fDYZ8mxq0hjwQ';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const PORTAL_URL = 'https://t8mn6kmn59-oss.github.io/evaluaciones-gp';

// Videos por quiz_id (agrega aquí más cursos cuando los tengas)
const VIDEOS = {
  'liderazgo-efectivo-2026': 'CHuOS6fRR1k',
  'inteligencia-artificial': 'EFGXcPvM3MY'
};

let nomId = null;
let quizId = null;
let countdownTimer = null;

async function init() {
  const params = new URLSearchParams(window.location.search);
  nomId = params.get('nom');

  if (!nomId) {
    mostrarError('No se encontró la nómina. Verifica el QR.');
    activarBoton();
    return;
  }

  try {
    const { data, error } = await sb.from('nominas').select('quiz_id').eq('id', nomId).single();
    if (error || !data) throw new Error('Nómina no encontrada');

    quizId = data.quiz_id;

    // Obtener nombre del quiz
    const { data: qData } = await sb.from('quizzes').select('name').eq('id', quizId).single();
    if (qData) {
      document.getElementById('curso-nombre').textContent = qData.name;
    }

    const videoId = VIDEOS[quizId];
    if (videoId) {
      cargarVideo(videoId);
    } else {
      // No hay video para este curso, ir directo
      document.getElementById('video-wrap').style.display = 'none';
      document.getElementById('curso-nombre').textContent = qData ? qData.name : '';
      activarBoton();
    }
  } catch (e) {
    mostrarError('No se pudo cargar la información del curso.');
    activarBoton();
  }
}

function cargarVideo(videoId) {
  const frame = document.getElementById('yt-frame');
  const loading = document.getElementById('loading');

  // Autoplay + sin controles externos + sin sugerencias al final
  frame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&enablejsapi=1`;
  frame.style.display = 'block';

  frame.onload = () => {
    loading.style.display = 'none';
    iniciarContador();
  };

  // Fallback si onload no dispara
  setTimeout(() => {
    loading.style.display = 'none';
    iniciarContador();
  }, 3000);
}

function iniciarContador() {
  // Permitir continuar después de 10 segundos
  let seg = 10;
  const msg = document.getElementById('timer-msg');
  msg.textContent = `Podrás continuar en ${seg} segundos...`;

  countdownTimer = setInterval(() => {
    seg--;
    if (seg <= 0) {
      clearInterval(countdownTimer);
      msg.textContent = '';
      activarBoton();
    } else {
      msg.textContent = `Podrás continuar en ${seg} segundo${seg !== 1 ? 's' : ''}...`;
    }
  }, 1000);
}

function activarBoton() {
  document.getElementById('btn-continuar').classList.add('active');
}

function mostrarError(msg) {
  document.getElementById('video-wrap').style.display = 'none';
  const eb = document.getElementById('error-box');
  eb.style.display = 'block';
  eb.querySelector('p').textContent = msg;
}

function irAlPortal() {
  window.location.href = `${PORTAL_URL}?nom=${nomId}`;
}

init();
</script>
</body>
</html>
