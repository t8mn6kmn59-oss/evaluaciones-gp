<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bienvenida · GP Empresas</title>
<style>
  :root {
    --navy: #1B2A4A;
    --navy2: #243558;
    --orange: #F5811E;
    --orange2: #E06A08;
    --gray: #F4F6FA;
    --border: #D8E0EE;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .logo {
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .logo-title {
    font-size: 22px;
    font-weight: 900;
    color: white;
    letter-spacing: .04em;
  }

  .logo-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-top: 2px;
  }

  .video-wrapper {
    width: 100%;
    max-width: 780px;
    background: #000;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    position: relative;
    aspect-ratio: 16/9;
  }

  .video-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Overlay que cubre el video al terminar */
  .video-overlay {
    position: absolute;
    inset: 0;
    background: rgba(27, 42, 74, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity .5s ease;
    border-radius: 14px;
    padding: 2rem;
  }

  .video-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .overlay-icon {
    font-size: 3rem;
    margin-bottom: .25rem;
  }

  .overlay-title {
    font-size: 20px;
    font-weight: 900;
    color: white;
    text-align: center;
  }

  .overlay-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    text-align: center;
    margin-top: -.5rem;
    margin-bottom: .25rem;
  }

  .btn-group {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 26px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    border: none;
    text-decoration: none;
    font-family: inherit;
    transition: all .18s;
  }

  .btn-orange {
    background: var(--orange);
    color: white;
  }

  .btn-orange:hover {
    background: var(--orange2);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(245,129,30,0.4);
  }

  .btn-outline {
    background: rgba(255,255,255,0.08);
    color: white;
    border: 1.5px solid rgba(255,255,255,0.25);
  }

  .btn-outline:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.5);
    transform: translateY(-2px);
  }

  /* Barra de progreso decorativa */
  .progress-bar {
    width: 100%;
    max-width: 780px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin-top: .75rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--navy2), var(--orange));
    border-radius: 2px;
    transition: width .5s linear;
  }

  .hint {
    margin-top: .75rem;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    text-align: center;
  }

  @media(max-width: 520px) {
    .btn { padding: 12px 18px; font-size: 13px; }
    .overlay-title { font-size: 17px; }
  }
</style>
</head>
<body>

<div class="logo">
  <div class="logo-title">GP Empresas</div>
  <div class="logo-sub">Plataforma de Evaluaciones</div>
</div>

<div class="video-wrapper" id="videoWrapper">
  <!-- 
    autoplay=1 → reproduce automático
    enablejsapi=1 → permite detectar cuando termina
    rel=0 → no muestra videos relacionados al terminar
    modestbranding=1 → menos branding de YouTube
  -->
  <iframe
    id="ytPlayer"
    src="https://www.youtube.com/embed/CHuOS6fRR1k?autoplay=1&enablejsapi=1&rel=0&modestbranding=1&playsinline=1"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

  <div class="video-overlay" id="overlay">
    <div class="overlay-icon">✅</div>
    <div class="overlay-title">¡Video completado!</div>
    <div class="overlay-sub">¿Qué quieres hacer ahora?</div>
    <div class="btn-group">
      <a class="btn btn-orange" href="index.html#quiz">
        📝 Ir a la prueba
      </a>
      <a class="btn btn-outline" href="index.html#material">
        📖 Revisar el manual
      </a>
    </div>
  </div>
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="hint">El video comenzará automáticamente</div>

<script>
  // API de YouTube para detectar cuando termina el video
  var tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  var firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  var player;
  var progressInterval;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('ytPlayer', {
      events: {
        'onStateChange': onPlayerStateChange,
        'onReady': onPlayerReady
      }
    });
  }

  function onPlayerReady(event) {
    // El autoplay ya está en la URL, pero por si acaso:
    // event.target.playVideo();
  }

  function onPlayerStateChange(event) {
    // YT.PlayerState.PLAYING = 1
    if (event.data === YT.PlayerState.PLAYING) {
      startProgress();
    }
    // YT.PlayerState.ENDED = 0
    if (event.data === YT.PlayerState.ENDED) {
      clearInterval(progressInterval);
      document.getElementById('progressFill').style.width = '100%';
      showOverlay();
    }
    // YT.PlayerState.PAUSED = 2
    if (event.data === YT.PlayerState.PAUSED) {
      clearInterval(progressInterval);
    }
  }

  function startProgress() {
    clearInterval(progressInterval);
    progressInterval = setInterval(function() {
      if (!player || !player.getDuration) return;
      var duration = player.getDuration();
      var current = player.getCurrentTime();
      if (duration > 0) {
        var pct = (current / duration) * 100;
        document.getElementById('progressFill').style.width = pct + '%';
      }
    }, 500);
  }

  function showOverlay() {
    document.getElementById('overlay').classList.add('visible');
  }

  // Fallback: si el usuario no tiene JS de la API activo,
  // mostrar botones después de X segundos (duración del video + 2s)
  // El video dura ~13s según la captura
  setTimeout(function() {
    var overlay = document.getElementById('overlay');
    if (!overlay.classList.contains('visible')) {
      overlay.classList.add('visible');
    }
  }, 20000); // 20 segundos de fallback
</script>

</body>
</html>
