<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bienvenido · GP Empresas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1B2A4A;
  --navy2:#243558;
  --orange:#F5811E;
  --orange2:#E06A08;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--navy);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

.bg-glow{
  position:absolute;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(245,129,30,0.12) 0%,transparent 70%);
  top:-100px;right:-150px;
  pointer-events:none;
}
.bg-glow2{
  position:absolute;
  width:400px;height:400px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(245,129,30,0.07) 0%,transparent 70%);
  bottom:-80px;left:-100px;
  pointer-events:none;
}

.container{
  width:100%;
  max-width:480px;
  padding:2rem 1.25rem;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
  z-index:1;
}

.logo-wrap{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:1.75rem;
  opacity:0;
  animation:fadeDown .5s ease .1s forwards;
}
.logo-dot{
  width:10px;height:10px;
  border-radius:50%;
  background:var(--orange);
}
.logo-text{
  font-size:13px;
  font-weight:900;
  color:white;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.logo-sub{
  font-size:10px;
  color:rgba(255,255,255,0.35);
  letter-spacing:.06em;
}

.video-container{
  width:100%;
  border-radius:16px;
  overflow:hidden;
  position:relative;
  background:#000;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  opacity:0;
  animation:fadeUp .6s ease .3s forwards;
}
.video-container iframe{
  width:100%;
  aspect-ratio:16/9;
  display:block;
  border:none;
}

.progress-wrap{
  width:100%;
  height:4px;
  background:rgba(255,255,255,0.1);
  border-radius:2px;
  margin-top:1.25rem;
  overflow:hidden;
  opacity:0;
  animation:fadeUp .5s ease .5s forwards;
}
.progress-bar{
  height:100%;
  background:var(--orange);
  border-radius:2px;
  width:0%;
  transition:width 1s linear;
}

.info-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:100%;
  margin-top:.6rem;
  opacity:0;
  animation:fadeUp .5s ease .6s forwards;
}
.info-label{
  font-size:11px;
  color:rgba(255,255,255,0.35);
  font-weight:600;
}
.timer{
  font-size:11px;
  color:rgba(255,255,255,0.35);
  font-weight:700;
  font-variant-numeric:tabular-nums;
}

.cta-wrap{
  width:100%;
  margin-top:1.5rem;
  opacity:0;
  animation:fadeUp .5s ease .7s forwards;
}

.btn-cta{
  width:100%;
  padding:15px;
  background:var(--orange);
  color:white;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  font-family:inherit;
  letter-spacing:.02em;
  transition:all .2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  position:relative;
  overflow:hidden;
}
.btn-cta:not(:disabled):hover{
  background:var(--orange2);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(245,129,30,0.35);
}
.btn-cta:not(:disabled):active{
  transform:translateY(0);
}
.btn-cta:disabled{
  background:rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.25);
  cursor:not-allowed;
}
.btn-cta svg{
  flex-shrink:0;
}

.btn-hint{
  text-align:center;
  font-size:11px;
  color:rgba(255,255,255,0.25);
  margin-top:.75rem;
  transition:color .3s;
}
.btn-hint.ready{
  color:rgba(245,129,30,0.7);
}

.pulse-ring{
  position:absolute;
  inset:0;
  border-radius:12px;
  border:2px solid var(--orange);
  opacity:0;
  animation:none;
}
.btn-cta.ready .pulse-ring{
  animation:pulse 1.5s ease infinite;
}

@keyframes fadeDown{
  from{opacity:0;transform:translateY(-12px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes pulse{
  0%{opacity:.6;transform:scale(1);}
  70%{opacity:0;transform:scale(1.05);}
  100%{opacity:0;transform:scale(1.05);}
}

@media(max-width:480px){
  .container{padding:1.5rem 1rem;}
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="container">

  <div class="logo-wrap">
    <div class="logo-dot"></div>
    <div>
      <div class="logo-text">GP Empresas</div>
      <div class="logo-sub">Somos Calidad de Vida Laboral</div>
    </div>
  </div>

  <div class="video-container">
    <iframe
      id="yt-player"
      src="https://www.youtube.com/embed/9Rif0HlWm2Y?autoplay=1&mute=1&controls=1&rel=0&modestbranding=1&enablejsapi=1&origin=https://t8mn6kmn59-oss.github.io"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="prog"></div>
  </div>

  <div class="info-row">
    <span class="info-label" id="info-label">Mira el video antes de continuar</span>
    <span class="timer" id="timer">0:13</span>
  </div>

  <div class="cta-wrap">
    <button class="btn-cta" id="btn" disabled>
      <div class="pulse-ring"></div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 8 16 12 12 16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Ir a la evaluación
    </button>
    <div class="btn-hint" id="hint">Disponible al finalizar el video</div>
  </div>

</div>

<script>
  var DURACION = 13;
  var DESTINO = 'https://t8mn6kmn59-oss.github.io/evaluaciones-gp/';

  var segundos = DURACION;
  var intervalo = null;
  var btn = document.getElementById('btn');
  var prog = document.getElementById('prog');
  var timerEl = document.getElementById('timer');
  var hint = document.getElementById('hint');
  var infoLabel = document.getElementById('info-label');

  function formatTime(s){
    return '0:' + (s < 10 ? '0' : '') + s;
  }

  function iniciarContador(){
    intervalo = setInterval(function(){
      segundos--;
      if(segundos < 0) segundos = 0;
      timerEl.textContent = formatTime(segundos);
      var pct = ((DURACION - segundos) / DURACION) * 100;
      prog.style.width = pct + '%';
      if(segundos <= 0){
        clearInterval(intervalo);
        habilitarBoton();
      }
    }, 1000);
  }

  function habilitarBoton(){
    btn.disabled = false;
    btn.classList.add('ready');
    hint.classList.add('ready');
    hint.textContent = '¡Todo listo! Haz clic para comenzar.';
    infoLabel.textContent = '¡Video completado!';
    timerEl.textContent = '✓';
    prog.style.width = '100%';
    prog.style.background = '#2D7D2D';
  }

  btn.addEventListener('click', function(){
    if(!btn.disabled){
      window.location.href = DESTINO;
    }
  });

  window.addEventListener('load', function(){
    setTimeout(iniciarContador, 1200);
  });
</script>

</body>
</html>
